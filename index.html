<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動報到系統</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f2f2f7; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        h2 { text-align: center; color: #1c1c1e; margin-bottom: 25px; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #3a3a3c; }
        input, select { width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 10px; font-size: 16px; box-sizing: border-box; background: #fff; }
        button { width: 100%; padding: 15px; background-color: #007aff; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:active { opacity: 0.8; }
        
        #qrcode-container {
            margin-top: 30px;
            display: none;
            flex-direction: column;
            align-items: center;
        }
        /* 確保畫布清晰且有足夠留白 */
        canvas {
            border: 1px solid #eee;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
        }
        .info { margin-top: 15px; font-size: 14px; color: #8e8e93; text-align: center; word-break: break-all; background: #f2f2f7; padding: 10px; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h2>活動報到碼</h2>
    
    <div class="field">
        <label>姓名</label>
        <input type="text" id="userName" placeholder="請輸入姓名" autocomplete="off">
    </div>

    <div class="field">
        <label>出生年 (西元)</label>
        <select id="birthYear"></select>
    </div>

    <div class="field">
        <label>出生月</label>
        <select id="birthMonth"></select>
    </div>

    <button onclick="generate()">產生 QR Code</button>

    <div id="qrcode-container">
        <canvas id="qrCanvas"></canvas>
        <div class="info">
            <strong>內容確認：</strong><br>
            <span id="txtOutput"></span>
        </div>
    </div>
</div>

<script>
    // 1. 初始化下拉選單
    const yearEl = document.getElementById('birthYear');
    const monthEl = document.getElementById('birthMonth');

    for (let y = 2020; y >= 1920; y--) {
        let opt = document.createElement('option');
        opt.value = y; opt.textContent = y + ' 年';
        yearEl.appendChild(opt);
    }

    for (let m = 1; m <= 12; m++) {
        let opt = document.createElement('option');
        let val = m.toString().padStart(2, '0');
        opt.value = val; opt.textContent = val + ' 月';
        monthEl.appendChild(opt);
    }

    // 2. 產生邏輯
    function generate() {
        const name = document.getElementById('userName').value.trim();
        const year = yearEl.value;
        const month = monthEl.value;

        if (!name) {
            alert("請填寫姓名");
            return;
        }

        // 取得今日 YYYYMMDD
        const now = new Date();
        const today = now.getFullYear() + 
                      (now.getMonth() + 1).toString().padStart(2, '0') + 
                      now.getDate().toString().padStart(2, '0');

        // 組合字串
        const dataString = name + year + month + today;

        // 使用 QRCode 函式庫渲染到 Canvas
        const canvas = document.getElementById('qrCanvas');
        
        // 關鍵設定：使用此函式庫能自動處理 UTF-8
        QRCode.toCanvas(canvas, dataString, {
            width: 260,
            margin: 2,
            errorCorrectionLevel: 'M', // 中等容錯，平衡複雜度與好掃程度
            color: {
                dark: "#000000",
                light: "#ffffff"
            }
        }, function (error) {
            if (error) {
                console.error(error);
                alert("產生失敗");
            } else {
                document.getElementById('txtOutput').textContent = dataString;
                document.getElementById('qrcode-container').style.display = 'flex';
                
                // 產生後震動回饋 (如果手機支援)
                if (navigator.vibrate) navigator.vibrate(50);
                
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        });
    }
</script>

</body>
</html>
